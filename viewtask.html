<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Task</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .task-view-wrapper { display: flex; justify-content: center; align-items: center; width: 100%; }
        .task-view-panel { background-color: var(--panel-bg); border-radius: 20px; padding: 60px; max-width: 700px; width: 100%; text-align: center; border: 1px solid rgba(168, 85, 247, 0.3); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        .task-view-panel i { font-size: 4rem; color: var(--neon-primary); margin-bottom: 30px; display: block; }
        .task-view-panel h1 { color: white; font-size: 2.5rem; margin: 0 0 20px 0; }
    </style>
</head>
<body>
    <div class="task-view-wrapper">
        <main class="task-view-panel">
            <i class="fas fa-tasks"></i>
            
            <h1 id="viewTitle">Loading...</h1>
            <p id="viewDesc" style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.8; margin-bottom: 50px;">...</p>
            
            <a href="dashboard.html" class="add-btn" style="text-decoration: none; padding: 15px 40px; display: inline-block; font-size: 1rem;">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </main>
    </div>

    <script>
        const savedTheme = localStorage.getItem('appTheme');
        if (savedTheme) { document.documentElement.style.setProperty('--neon-primary', savedTheme); }

        // Grab the task data from the URL parameters!
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('viewTitle').innerText = urlParams.get('title') || 'Task Not Found';
        document.getElementById('viewDesc').innerText = urlParams.get('desc') || 'No additional details provided.';
    </script>
</body>
</html>
