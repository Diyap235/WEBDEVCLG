<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0B0914; --panel-bg: #1A1625; --neon-primary: #A855F7; 
            --neon-blue: #06B6D4; --text-main: #FFFFFF; --text-muted: #9CA3AF;
            --danger-red: #EF4444; --border-glow: 0 0 15px rgba(168, 85, 247, 0.2);
        }
        body { margin: 0; padding: 20px; font-family: 'Poppins', sans-serif; background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .dashboard-wrapper { display: flex; width: 100%; max-width: 1800px; min-height: 90vh; gap: 40px; }
        
        /* Sidebar */
        .left-panel { flex: 1; min-width: 280px; max-width: 350px; background-color: var(--panel-bg); border-radius: 20px; padding: 50px 40px; display: flex; flex-direction: column; border: 1px solid rgba(168, 85, 247, 0.3); box-shadow: var(--border-glow); overflow-y: auto; }
        .left-panel::-webkit-scrollbar { display: none; }
        .user-info h2 { margin: 0 0 5px 0; font-size: 1.8rem; color: var(--neon-blue); }
        .user-info p { margin: 0; color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; }
        .side-nav { margin-top: 30px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .nav-item { text-decoration: none; color: var(--text-muted); padding: 12px 20px; border-radius: 10px; font-weight: 500; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(168, 85, 247, 0.1); color: var(--neon-primary); border-left: 4px solid var(--neon-primary); }
        .nav-section-title { color: rgba(255,255,255,0.3); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-left: 20px; margin-bottom: 5px; margin-top: 10px;}
        .logout-btn { background: transparent; color: var(--neon-primary); border: 1px solid var(--neon-primary); padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; text-decoration: none; margin-top: 20px;}
        .logout-btn:hover { background: var(--neon-primary); color: white; box-shadow: 0 0 15px var(--neon-primary); }

        /* Center Panel */
        .center-panel { flex: 3; background-color: var(--panel-bg); border-radius: 20px; padding: 50px; display: flex; flex-direction: column; border: 1px solid rgba(168, 85, 247, 0.3); box-shadow: var(--border-glow); overflow: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .top-bar h1 { margin: 0; font-size: 2rem; font-weight: 600; }
        
        /* Search Input */
        .search-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 18px 25px; border-radius: 12px; font-family: 'Poppins', sans-serif; font-size: 1.1rem; outline: none; transition: 0.3s; width: 100%; box-sizing: border-box; margin-bottom: 30px; }
        .search-input:focus { border-color: var(--neon-primary); box-shadow: 0 0 10px rgba(168, 85, 247, 0.3) inset; }

        /* Task List */
        .task-list-container { flex: 1; overflow-y: auto; padding-right: 10px; }
        .task-list-container::-webkit-scrollbar { width: 8px; }
        .task-list-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .task-list-container::-webkit-scrollbar-thumb { background: var(--neon-primary); border-radius: 10px; }
        .task-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 25px; margin-bottom: 20px; transition: 0.3s; }
        .task-card:hover { border-color: var(--neon-primary); background: rgba(255, 255, 255, 0.05); transform: translateX(5px); }
        .task-details h3 { margin: 0 0 8px 0; font-size: 1.2rem; color: var(--neon-primary); font-weight: 500; }
        .task-details p { margin: 0; font-size: 0.95rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="left-panel">
            <div class="user-info"><h2>Search 👀</h2><p>Find tasks instantly.</p></div>
            <nav class="side-nav">
                <span class="nav-section-title">Main Menu</span>
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="search.html" class="nav-item active"><i class="fas fa-search"></i> Search Tasks</a>
                <a href="performance.html" class="nav-item"><i class="fas fa-chart-line"></i> Performance</a>
                <a href="themes.html" class="nav-item"><i class="fas fa-palette"></i> Themes</a>
                <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
            </nav>
            <a href="logout.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </aside>

        <main class="center-panel">
            <div class="top-bar"><h1>Search Tasks</h1></div>
            <input type="text" id="searchInput" class="search-input" placeholder="Type to search...">
            <div class="task-list-container" id="searchList">
                <p style="text-align: center; color: var(--text-muted);">Loading your tasks...</p>
            </div>
        </main>
    </div>

    <script>
        const savedTheme = localStorage.getItem('appTheme');
        if (savedTheme) { document.documentElement.style.setProperty('--neon-primary', savedTheme); }

        const userId = localStorage.getItem('userId');
        let allTasks = []; 

        async function fetchAllTasks() {
            try {
                const response = await fetch(`http://localhost:3000/tasks/${userId}`);
                allTasks = await response.json();
                renderSearch(allTasks); 
            } catch (error) {
                document.getElementById('searchList').innerHTML = '<p style="color: var(--danger-red);">Error fetching tasks.</p>';
            }
        }

        function renderSearch(tasks) {
            const list = document.getElementById('searchList');
            list.innerHTML = '';
            if (tasks.length === 0) { list.innerHTML = '<p style="text-align: center; color: var(--text-muted);">No tasks match your search.</p>'; return; }

            tasks.forEach(task => {
                list.innerHTML += `
                    <div class="task-card">
                        <div class="task-details">
                            <h3>${task.title}</h3>
                            <p>${task.description || 'No description'}</p>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            const term = e.target.value.toLowerCase();
            const filteredTasks = allTasks.filter(task => 
                task.title.toLowerCase().includes(term) || 
                (task.description && task.description.toLowerCase().includes(term))
            );
            renderSearch(filteredTasks);
        });

        fetchAllTasks();
    </script>
</body>
</html>
