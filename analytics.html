<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0B0914; --panel-bg: #1A1625; --neon-primary: #A855F7; 
            --neon-blue: #06B6D4; --text-main: #FFFFFF; --text-muted: #9CA3AF;
            --danger-red: #EF4444; --success-green: #10B981; --warning-yellow: #F59E0B;
            --border-glow: 0 0 20px rgba(168, 85, 247, 0.15);
        }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .dashboard-wrapper { display: flex; width: 98%; max-width: 1600px; height: 92vh; gap: 40px; }
        
        .left-panel { flex: 1; min-width: 300px; max-width: 380px; background-color: var(--panel-bg); border-radius: 24px; padding: 50px 40px; display: flex; flex-direction: column; border: 1px solid rgba(168, 85, 247, 0.2); box-shadow: var(--border-glow); }
        .user-info h2 { margin: 0 0 8px 0; font-size: 2.2rem; color: var(--neon-blue); }
        .user-info p { margin: 0; color: var(--text-muted); font-size: 1.05rem; line-height: 1.6; }
        .side-nav { margin-top: 40px; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .nav-item { text-decoration: none; color: var(--text-muted); padding: 15px 25px; border-radius: 12px; font-size: 1.1rem; font-weight: 500; display: flex; align-items: center; gap: 18px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(168, 85, 247, 0.1); color: var(--neon-primary); border-left: 5px solid var(--neon-primary); }
        .nav-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 20px 0; }
        .nav-section-title { color: rgba(255,255,255,0.3); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-left: 25px; margin-bottom: 8px; }
        .logout-btn { background: transparent; color: var(--neon-primary); border: 1px solid var(--neon-primary); padding: 15px; border-radius: 12px; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 30px;}
        
        .center-panel { flex: 3; background-color: var(--panel-bg); border-radius: 24px; padding: 50px 60px; display: flex; flex-direction: column; border: 1px solid rgba(168, 85, 247, 0.2); box-shadow: var(--border-glow); overflow: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .top-bar h1 { margin: 0; font-size: 2.2rem; font-weight: 600; }

        /* Analytics Grid Specifics */
        .analytics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 20px;}
        
        .stat-card { 
            background: rgba(255,255,255,0.02); 
            border: 2px solid transparent; 
            border-radius: 24px; 
            padding: 40px; 
            text-align: center; 
            transition: 0.3s; 
        }
        
        .stat-card.pending { border-color: var(--warning-yellow); box-shadow: 0 0 30px rgba(245, 158, 11, 0.15); }
        .stat-card.completed { border-color: var(--success-green); box-shadow: 0 0 30px rgba(16, 185, 129, 0.15); }
        .stat-card.deleted { border-color: var(--danger-red); box-shadow: 0 0 30px rgba(239, 68, 68, 0.15); }

        .stat-card h1 { font-size: 5rem; margin: 0; color: white; line-height: 1; }
        .stat-card p { margin: 15px 0 0 0; font-weight: 600; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .stat-card.pending p { color: var(--warning-yellow); }
        .stat-card.completed p { color: var(--success-green); }
        .stat-card.deleted p { color: var(--danger-red); }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        
        <aside class="left-panel">
            <div class="user-info"><h2>Analytics 📊</h2><p>View your workload.</p></div>
            <nav class="side-nav">
                <span class="nav-section-title">Main Menu</span>
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="search.html" class="nav-item"><i class="fas fa-search"></i> Search Tasks</a>
                <a href="performance.html" class="nav-item active"><i class="fas fa-chart-line"></i> Performance</a>
                <a href="themes.html" class="nav-item"><i class="fas fa-palette"></i> Themes</a>
                
                <div class="nav-divider"></div>
                <span class="nav-section-title">Support & Info</span>
                <a href="help.html" class="nav-item" style="padding: 10px 20px; font-size: 1rem;"><i class="fas fa-life-ring"></i> Help Center</a>
                <a href="profile.html" class="nav-item" style="padding: 10px 20px; font-size: 1rem;"><i class="fas fa-user"></i> Profile</a>
            </nav>
            <a href="logout.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </aside>

        <main class="center-panel">
            <div class="top-bar">
                <h1>Performance Overview</h1>
            </div>

            <div class="analytics-grid">
                <div class="stat-card pending">
                    <h1 id="countPending">0</h1>
                    <p><i class="fas fa-clock"></i> Pending</p>
                </div>

                <div class="stat-card completed">
                    <h1 id="countCompleted">0</h1>
                    <p><i class="fas fa-check-circle"></i> Completed</p>
                </div>

                <div class="stat-card deleted">
                    <h1 id="countDeleted">0</h1>
                    <p><i class="fas fa-trash-alt"></i> Deleted</p>
                </div>
            </div>

            <p style="text-align: center; margin-top: 50px; color: var(--text-muted); font-size: 1.1rem;">
                "Productivity is never an accident. It is always the result of a commitment to excellence."
            </p>
        </main>
    </div>

    <script>
        const savedTheme = localStorage.getItem('appTheme');
        if (savedTheme) { document.documentElement.style.setProperty('--neon-primary', savedTheme); }
        
        const userId = localStorage.getItem('userId');
        
        if (!userId) {
            window.location.href = 'login.html';
        }

        async function fetchAnalytics() {
            try {
                const response = await fetch(`http://localhost:3000/tasks/${userId}`);
                const tasks = await response.json();
                
                // Categorize tasks based on our new status feature
                const pending = tasks.filter(t => t.status === 'pending').length;
                const completed = tasks.filter(t => t.status === 'completed').length;
                const deleted = tasks.filter(t => t.status === 'deleted').length;

                // Update UI
                document.getElementById('countPending').innerText = pending;
                document.getElementById('countCompleted').innerText = completed;
                document.getElementById('countDeleted').innerText = deleted;

            } catch (error) {
                console.error("Failed to fetch analytics");
            }
        }

        fetchAnalytics();
    </script>
</body>
</html>
