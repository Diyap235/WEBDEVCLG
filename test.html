<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Diagnostics</title>
    <style>
        .terminal {
            background: #050505;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            color: #10B981;
            height: 300px;
            overflow-y: auto;
            margin-top: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .test-btn {
            background: rgba(6, 182, 212, 0.1);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins';
            font-weight: 600;
            transition: 0.3s;
            margin-right: 10px;
        }
        .test-btn:hover {
            background: var(--neon-blue);
            color: white;
            box-shadow: 0 0 15px var(--neon-blue);
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="left-panel">
            <div class="user-info"><h2>Dev Tools ⚙️</h2><p>System Diagnostics.</p></div>
            <nav class="side-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="search.html" class="nav-item"><i class="fas fa-search"></i> Search Tasks</a>
                <a href="test.html" class="nav-item active" style="border-left-color: var(--neon-blue); color: var(--neon-blue);"><i class="fas fa-bug"></i> API Tester</a>
            </nav>
            <a href="logout.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </aside>

        <main class="center-panel">
            <h2 style="margin-top:0; color: white;">Backend Connection Test</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Use this tool to verify that the Node.js Express server and MongoDB are responding properly.</p>

            <div>
                <button class="test-btn" onclick="pingServer()"><i class="fas fa-network-wired"></i> Fetch My Tasks (GET)</button>
                <button class="test-btn" style="border-color: var(--danger-red); color: var(--danger-red);" onclick="clearTerminal()"><i class="fas fa-eraser"></i> Clear Terminal</button>
            </div>

            <div class="terminal" id="terminalOutput">
                > System initialized.<br>
                > Ready to test connection to http://localhost:3000...<br>
            </div>
        </main>
    </div>

    <script>
        const savedTheme = localStorage.getItem('appTheme');
        if (savedTheme) { document.documentElement.style.setProperty('--neon-primary', savedTheme); }
        const userId = localStorage.getItem('userId');

        function logToTerminal(message, type = 'info') {
            const terminal = document.getElementById('terminalOutput');
            const color = type === 'error' ? '#EF4444' : type === 'success' ? '#A855F7' : '#10B981';
            terminal.innerHTML += `<br><span style="color: ${color};">> ${message}</span>`;
            terminal.scrollTop = terminal.scrollHeight; // Auto scroll to bottom
        }

        function clearTerminal() {
            document.getElementById('terminalOutput').innerHTML = '> Terminal cleared.<br>';
        }

        async function pingServer() {
            if (!userId) {
                logToTerminal('ERROR: No User ID found in localStorage. Please log in first.', 'error');
                return;
            }

            logToTerminal(`Sending GET request to /tasks/${userId}...`);

            try {
                const startTime = Date.now();
                const response = await fetch(`http://localhost:3000/tasks/${userId}`);
                const latency = Date.now() - startTime;

                if (response.ok) {
                    const data = await response.json();
                    logToTerminal(`SUCCESS: Server responded in ${latency}ms`, 'success');
                    logToTerminal(`Found ${data.length} tasks in MongoDB.`);
                    logToTerminal(`RAW JSON DATA:`);
                    logToTerminal(JSON.stringify(data, null, 2).replace(/\n/g, '<br>').replace(/ /g, '&nbsp;'));
                } else {
                    logToTerminal(`ERROR: Server returned status ${response.status}`, 'error');
                }
            } catch (error) {
                logToTerminal(`CRITICAL ERROR: Could not connect to backend. Is node server.js running?`, 'error');
            }
        }
    </script>
</body>
</html>
