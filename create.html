<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task - Task Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container form-container">
        <header>
            <div class="icon-wrapper" style="color: var(--success-green); background: #E6FFED;">
                <i class="fas fa-plus-circle"></i>
            </div>
            <h1>New Task</h1>
            <p class="subtitle">What do you need to get done?</p>
        </header>

        <div id="message-box" class="message-box"></div>

        <form id="createForm">
            <div class="form-group">
                <i class="fas fa-heading input-icon"></i>
                <input type="text" id="taskTitle" placeholder="Task Title" required>
            </div>

            <div class="form-group">
                <i class="fas fa-align-left input-icon" style="top: 25px;"></i>
                <textarea id="taskDesc" placeholder="Detailed Description (Optional)" style="width: 100%; padding: 16px 16px 16px 50px; border: 1px solid rgba(15, 23, 42, 0.1); border-radius: 12px; font-family: 'Poppins', sans-serif; font-size: 0.95rem; color: var(--navy-dark); background-color: rgba(255, 255, 255, 0.9); outline: none; min-height: 100px; resize: vertical;"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="nav-link btn-primary btn-block">
                Create Task
            </button>
        </form>

        <div class="footer-links">
            <p><a href="dashboard.html" class="text-link"><i class="fas fa-arrow-left"></i> Cancel & Return</a></p>
        </div>
    </div>

    <script>
        // Auth Guard
        const userId = localStorage.getItem('userId');
        if (!userId) window.location.href = 'login.html';

        document.getElementById('createForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDesc').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageBox = document.getElementById('message-box');

            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:3000/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description, userId })
                });

                if (response.ok) {
                    messageBox.style.display = 'block';
                    messageBox.className = 'message-box success';
                    messageBox.innerText = 'Task created! Redirecting to dashboard...';
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    throw new Error('Failed to create');
                }
            } catch (error) {
                messageBox.style.display = 'block';
                messageBox.className = 'message-box error';
                messageBox.innerText = 'Error creating task. Check backend connection.';
                submitBtn.innerHTML = 'Create Task';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
