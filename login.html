<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Task Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container form-container">
        <header>
            <div class="icon-wrapper">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Log in to access your dashboard</p>
        </header>

        <div id="message-box" class="message-box"></div>

        <form id="loginForm">
            <div class="form-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <div class="form-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" id="submitBtn" class="nav-link btn-primary btn-block">
                Log In
            </button>
        </form>

        <div class="footer-links">
            <p>Don't have an account? <a href="register.html" class="text-link">Register here</a></p>
            <p><a href="index.html" class="text-link"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageBox = document.getElementById('message-box');

            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            submitBtn.disabled = true;

            try {
                // SMART URL: Switches automatically based on where it's running
                const apiUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                    ? 'http://localhost:3000/login' 
                    : '/api/login';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success! Save user data to browser storage
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('username', data.username);
                    
                    messageBox.style.display = 'block';
                    messageBox.className = 'message-box success';
                    messageBox.innerText = 'Login successful! Taking you to dashboard...';
                    
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    // Wrong password or email
                    messageBox.style.display = 'block';
                    messageBox.className = 'message-box error';
                    messageBox.innerText = data.error || 'Invalid credentials.';
                    submitBtn.innerHTML = 'Log In';
                    submitBtn.disabled = false;
                }
            } catch (error) {
                // Server is down
                messageBox.style.display = 'block';
                messageBox.className = 'message-box error';
                messageBox.innerText = 'Cannot connect to server. Is your backend running?';
                submitBtn.innerHTML = 'Log In';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
