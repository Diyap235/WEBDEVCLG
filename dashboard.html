<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0B0914; 
            --panel-bg: #1A1625; 
            --neon-primary: #A855F7; 
            --neon-blue: #06B6D4; 
            --text-main: #FFFFFF; 
            --text-muted: #9CA3AF;
            --danger-red: #EF4444; 
            --success-green: #10B981;
            --border-glow: 0 0 20px rgba(168, 85, 247, 0.15); 
        }

        html { background-color: var(--bg-dark); }
        
        body { 
            margin: 0; padding: 0; 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .dashboard-wrapper { display: flex; width: 98%; max-width: 1600px; height: 92vh; gap: 40px; }
        
        /* Sidebar Styles */
        .left-panel { 
            flex: 1; min-width: 300px; max-width: 380px; 
            background-color: var(--panel-bg); border-radius: 24px; padding: 40px 30px; 
            display: flex; flex-direction: column; 
            border: 1px solid rgba(168, 85, 247, 0.2); box-shadow: var(--border-glow); 
            overflow-y: auto; 
        }
        .left-panel::-webkit-scrollbar { display: none; } 
        
        .user-info h2 { margin: 0 0 8px 0; font-size: 2.2rem; color: var(--neon-blue); }
        .user-info p { margin: 0; color: var(--text-muted); font-size: 1.05rem; line-height: 1.6; }
        
        .side-nav { margin-top: 30px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .nav-item { 
            text-decoration: none; color: var(--text-muted); padding: 12px 20px; 
            border-radius: 12px; font-size: 1.1rem; font-weight: 500; display: flex; align-items: center; gap: 15px; transition: 0.3s; 
        }
        .nav-item:hover, .nav-item.active { 
            background: rgba(168, 85, 247, 0.1); color: var(--neon-primary); 
            border-left: 5px solid var(--neon-primary); 
        }
        
        .nav-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 15px 0; }
        .nav-section-title { color: rgba(255,255,255,0.3); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-left: 20px; margin-bottom: 5px; }

        .logout-btn { 
            background: transparent; color: var(--neon-primary); border: 1px solid var(--neon-primary); 
            padding: 12px; border-radius: 12px; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: 0.3s; 
            display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 20px;
        }
        .logout-btn:hover { background: var(--neon-primary); color: white; box-shadow: 0 0 20px var(--neon-primary); }

        /* Main Center Panel */
        .center-panel { 
            flex: 3; background-color: var(--panel-bg); border-radius: 24px; padding: 40px 50px; 
            display: flex; flex-direction: column; border: 1px solid rgba(168, 85, 247, 0.2); 
            box-shadow: var(--border-glow); overflow: hidden; 
        }
        
        /* Top Action Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .top-bar h1 { margin: 0; font-size: 2.2rem; font-weight: 600; }
        .top-bar-icons { display: flex; gap: 20px; }
        
        .icon-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; 
            width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; transition: 0.3s; font-size: 1.3rem; text-decoration: none; position: relative;
        }
        .icon-btn:hover { background: var(--neon-primary); border-color: var(--neon-primary); box-shadow: 0 0 20px var(--neon-primary); transform: translateY(-3px); }
        .badge { position: absolute; top: 0; right: 2px; background: var(--danger-red); width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--panel-bg); }

        /* Task Form */
        .task-form { display: flex; gap: 20px; margin-bottom: 25px; }
        .task-form input { 
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: white; 
            padding: 18px 25px; border-radius: 16px; font-family: 'Poppins', sans-serif; font-size: 1.1rem; outline: none; transition: 0.3s; 
        }
        #taskTitle { flex: 1.5; } #taskDesc { flex: 2; }
        .task-form input:focus { border-color: var(--neon-primary); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2) inset; }
        
        .add-btn { 
            background: var(--neon-primary); color: white; border: none; padding: 0 40px; 
            border-radius: 16px; font-weight: 600; font-size: 1.1rem; font-family: 'Poppins', sans-serif; cursor: pointer; transition: 0.3s; 
        }
        .add-btn:hover { box-shadow: 0 0 20px var(--neon-primary); transform: translateY(-3px); }

        /* Task List */
        .task-list-container { flex: 1; overflow-y: auto; padding-right: 15px; }
        .task-list-container::-webkit-scrollbar { width: 8px; }
        .task-list-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .task-list-container::-webkit-scrollbar-thumb { background: var(--neon-primary); border-radius: 10px; }
        
        .task-card { 
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 16px; padding: 20px 30px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; 
        }
        .task-card:hover { border-color: var(--neon-primary); background: rgba(255, 255, 255, 0.04); transform: translateX(6px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .task-details h3 { margin: 0 0 8px 0; font-size: 1.2rem; color: white; font-weight: 500; cursor: pointer; transition: 0.2s;}
        .task-details h3:hover { color: var(--neon-primary); }
        .task-details p { margin: 0; font-size: 0.95rem; color: var(--text-muted); }
        
        .action-btns { display: flex; gap: 15px; }
        .action-btn { 
            width: 45px; height: 45px; border-radius: 12px; cursor: pointer; transition: 0.3s; 
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem; background: transparent;
        }
        .btn-check { color: var(--text-muted); border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-check:hover, .btn-check.completed { color: var(--success-green); border-color: var(--success-green); box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger-red); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-delete:hover { background: var(--danger-red); color: white; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        
        <aside class="left-panel">
            <div class="user-info">
                <h2>Hello, <span id="userNameDisplay">User</span> 👋</h2>
                <p>Your personal workspace.</p>
            </div>
            
            <nav class="side-nav">
                <span class="nav-section-title">Main Menu</span>
                <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="search.html" class="nav-item"><i class="fas fa-search"></i> Search Tasks</a>
                <a href="performance.html" class="nav-item"><i class="fas fa-chart-line"></i> Performance</a>
                <a href="themes.html" class="nav-item"><i class="fas fa-palette"></i> Themes</a>
                
                <a href="analytics.html" class="nav-item"><i class="fas fa-chart-pie"></i> Analytics</a>
                
                <div class="nav-divider"></div>
                
                <span class="nav-section-title">Support & Info</span>
                <a href="help.html" class="nav-item" style="padding: 10px 20px; font-size: 1rem;"><i class="fas fa-life-ring"></i> Help Center</a>
                <a href="faq.html" class="nav-item" style="padding: 10px 20px; font-size: 1rem;"><i class="fas fa-question-circle"></i> FAQ</a>
                <a href="contact.html" class="nav-item" style="padding: 10px 20px; font-size: 1rem;"><i class="fas fa-envelope"></i> Contact Us</a>
                <a href="about.html" class="nav-item" style="padding: 10px 20px; font-size: 1rem;"><i class="fas fa-info-circle"></i> About App</a>
            </nav>

            <button onclick="handleLogout()" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </aside>

        <main class="center-panel">
            
            <div class="top-bar">
                <h1>My Tasks</h1>
                <div class="top-bar-icons">
                    <a href="notification.html" class="icon-btn" title="Notifications">
                        <i class="fas fa-bell"></i>
                        <span class="badge"></span>
                    </a>
                    <a href="profile.html" class="icon-btn" title="User Profile">
                        <i class="fas fa-user-astronaut"></i>
                    </a>
                </div>
            </div>

            <form id="createTaskForm" class="task-form">
                <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                <input type="text" id="taskDesc" placeholder="Description (Optional)">
                <button type="submit" id="submitBtn" class="add-btn">
                    <i class="fas fa-plus"></i> Add
                </button>
            </form>

            <div class="task-list-container" id="taskList">
                <p style="text-align: center; color: var(--text-muted); margin-top: 20px;">Loading tasks...</p>
            </div>
        </main>
    </div>

    <script>
        const userId = localStorage.getItem('userId');
        const username = localStorage.getItem('username');

        // 1. Setup & Authentication
        function initializeApp() {
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('userNameDisplay').innerText = username || 'User';
            
            const savedTheme = localStorage.getItem('appTheme');
            if (savedTheme) { 
                document.documentElement.style.setProperty('--neon-primary', savedTheme); 
            }
            
            loadTasks();
        }

        // 2. Fetch Tasks from Backend
        async function loadTasks() {
            try {
                const response = await fetch(`http://localhost:3000/tasks/${userId}`);
                const tasks = await response.json();
                renderTasksToScreen(tasks);
            } catch (error) {
                console.error("Database connection failed:", error);
                document.getElementById('taskList').innerHTML = '<p style="color: var(--danger-red); text-align: center;">Failed to load tasks from server.</p>';
            }
        }

        // 3. Render Tasks to HTML
        function renderTasksToScreen(tasks) {
            const listElement = document.getElementById('taskList');
            listElement.innerHTML = ''; 

            // Filter out 'deleted' tasks from the main view
            const visibleTasks = tasks.filter(t => t.status !== 'deleted');

            if (visibleTasks.length === 0) { 
                listElement.innerHTML = '<p style="text-align: center; color: var(--text-muted); font-size: 1.1rem; margin-top: 40px;">No active tasks. Add one above! ✨</p>'; 
                return; 
            }

            visibleTasks.forEach(task => {
                const safeTitle = encodeURIComponent(task.title);
                const safeDesc = encodeURIComponent(task.description || '');
                const isCompleted = task.status === 'completed';
                
                const cardStyle = isCompleted ? 'opacity: 0.5; text-decoration: line-through;' : '';
                const checkClass = isCompleted ? 'btn-check completed' : 'btn-check';
                const checkIcon = isCompleted ? 'fa-check-circle' : 'fa-circle';

                listElement.innerHTML += `
                    <div class="task-card" style="${cardStyle}">
                        <div class="task-details">
                            <h3 onclick="window.location.href='viewtask.html?id=${task._id}&title=${safeTitle}&desc=${safeDesc}'">
                                ${task.title}
                            </h3>
                            <p>${task.description || 'No description provided.'}</p>
                        </div>
                        <div class="action-btns">
                            <button class="action-btn ${checkClass}" onclick="toggleTaskStatus('${task._id}', '${task.status}')" title="Mark as Done">
                                <i class="fas ${checkIcon}"></i>
                            </button>
                            <button class="action-btn btn-delete" onclick="deleteTask('${task._id}')" title="Delete Task">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // 4. Handle Creating a Task
        async function handleCreateTask(event) {
            event.preventDefault(); 
            
            const titleInput = document.getElementById('taskTitle');
            const descInput = document.getElementById('taskDesc');
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; 
            submitBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:3000/tasks', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        title: titleInput.value, 
                        description: descInput.value, 
                        userId: userId 
                    })
                });

                if (response.ok) {
                    titleInput.value = ''; 
                    descInput.value = '';
                    loadTasks();
                } else {
                    alert('Server rejected the task.');
                }
            } catch (error) { 
                alert('Failed to save task. Is backend running?'); 
            } finally { 
                submitBtn.innerHTML = '<i class="fas fa-plus"></i> Add'; 
                submitBtn.disabled = false; 
            }
        }

        // 5. Handle Checking off a Task
        async function toggleTaskStatus(taskId, currentStatus) {
            const newStatus = currentStatus === 'completed' ? 'pending' : 'completed';
            try {
                const response = await fetch(`http://localhost:3000/tasks/${taskId}`, { 
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                }); 
                
                if (!response.ok) {
                    alert("⚠️ Server rejected the update! Did you restart your Node server?");
                    return;
                }
                loadTasks(); 
            } catch (error) { 
                alert('⚠️ Failed to reach the server. Make sure node server.js is running!'); 
            }
        }

        // 6. Handle Deleting a Task (Soft Delete)
        async function deleteTask(taskId) {
            if (confirm('Are you sure you want to delete this task?')) {
                try {
                    await fetch(`http://localhost:3000/tasks/${taskId}`, { method: 'DELETE' }); 
                    loadTasks(); 
                } catch (error) { 
                    alert('Failed to delete task.'); 
                }
            }
        }

        // 7. Handle Logout
        function handleLogout() {
            localStorage.clear(); 
            window.location.href = 'index.html'; 
        }

        // Event Listeners and Initialization
        document.getElementById('createTaskForm').addEventListener('submit', handleCreateTask);
        initializeApp();

    </script>
</body>
</html>
