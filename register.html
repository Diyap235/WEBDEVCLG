<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Task Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container form-container">
        <header>
            <div class="icon-wrapper">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">Join us to start managing your tasks</p>
        </header>

        <div id="message-box" class="message-box"></div>

        <form id="registerForm">
            <div class="form-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <div class="form-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" placeholder="Password (Min 6 chars)" required>
            </div>

            <div class="form-group">
                <i class="fas fa-check-circle input-icon"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <button type="submit" id="submitBtn" class="nav-link btn-primary btn-block">
                Create Account
            </button>
        </form>

        <div class="footer-links">
            <p>Already have an account? <a href="login.html" class="text-link">Log In here</a></p>
            <p><a href="index.html" class="text-link"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageBox = document.getElementById('message-box');

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters.', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }

            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
            submitBtn.disabled = true;

            try {
                // SMART URL: Switches automatically based on where it's running
               const apiUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
    ? 'http://localhost:3000/register' 
    : '/register';
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Account created successfully! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showMessage(data.error || 'Registration failed.', 'error');
                    resetButton();
                }
            } catch (error) {
                showMessage('Server error. Is your Node backend running?', 'error');
                resetButton();
            }

            function showMessage(msg, type) {
                messageBox.style.display = 'block';
                messageBox.className = `message-box ${type}`;
                messageBox.innerText = msg;
            }
            function resetButton() {
                submitBtn.innerHTML = 'Create Account';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
