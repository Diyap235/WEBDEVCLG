<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logging Out...</title>
    </head>
<body>
    <div style="text-align: center; color: white;">
        <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: var(--neon-primary); margin-bottom: 20px;"></i>
        <h2>Logging you out securely...</h2>
    </div>

    <script>
        const savedTheme = localStorage.getItem('appTheme');
        if (savedTheme) { document.documentElement.style.setProperty('--neon-primary', savedTheme); }

        // Clear session
        setTimeout(() => {
            localStorage.removeItem('userId');
            localStorage.removeItem('username');
            window.location.href = 'index.html'; // Go back to landing page
        }, 1500); // 1.5 second delay for visual feedback
    </script>
</body>
</html>
